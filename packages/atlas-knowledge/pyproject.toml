[project]
name = "atlas-knowledge"
version = "0.1.0"
description = "ATLAS knowledge: RAG, embeddings, vector store, ingestion"
requires-python = ">=3.13"
dependencies = [
    "atlas-core",
    "pydantic>=2.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["atlas_knowledge"]
