[project]
name = "atlas-knowledge"
version = "0.1.0"
description = "ATLAS knowledge: RAG, embeddings, vector store, ingestion"
requires-python = ">=3.13"
dependencies = [
    "atlas-core",
    "atlas-graph",
    "pydantic>=2.10",
    "sentence-transformers>=3.3",
    "chromadb>=0.5",
    "pymupdf>=1.25",
    "anyio>=4.6",
    "playwright>=1.45,<2",
    "trafilatura>=1.12,<2",
    "igraph>=0.11",
    "sqlalchemy>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["atlas_knowledge"]
