[project]
name = "atlas-plugins"
version = "0.1.0"
description = "ATLAS plugins: framework + integrations"
requires-python = ">=3.13"
dependencies = [
    "atlas-core",
    "cryptography>=42.0",
    "httpx>=0.27",
    "structlog>=24.4",
    "sqlalchemy>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["atlas_plugins"]
