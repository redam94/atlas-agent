[project]
name = "atlas-graph"
version = "0.1.0"
description = "ATLAS graph: Neo4j store, schema migrations, backfill"
requires-python = ">=3.13"
dependencies = [
    "atlas-core",
    "neo4j>=5.20,<6",
    "structlog>=24.4",
]

[project.scripts]
atlas-graph = "atlas_graph.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["atlas_graph"]
