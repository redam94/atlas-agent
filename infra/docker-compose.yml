services:
  postgres:
    image: postgres:16
    container_name: atlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: atlas-api
    restart: unless-stopped
    env_file: ../.env
    environment:
      ATLAS_DB__DATABASE_URL: postgresql://atlas:atlas@postgres:5432/atlas
      ATLAS_DB__REDIS_URL: redis://redis:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: atlas-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  postgres_data:
  redis_data:
